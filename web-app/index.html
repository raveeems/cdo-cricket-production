      @font-face { font-family: 'Inter_500Medium'; src: url('/fonts/Inter_500Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }

    <script>
      (function(){
        var ICON_FONTS = ['ionicons','material-community','feather','material','FontAwesome','MaterialCommunityIcons','MaterialIcons','Ionicons','Feather'];
        var INTER = '"Inter","Inter_400Regular",sans-serif';
        var mo = new MutationObserver(function(muts){
          muts.forEach(function(m){
            m.addedNodes.forEach(function(n){
              if(n.nodeType===1) fixNode(n);
            });
          });
        });
        function fixNode(el){
          if(!el.querySelectorAll) return;
          var texts = el.querySelectorAll('[dir="auto"]');
          for(var i=0;i<texts.length;i++){
            var s = texts[i].style;
            var ff = s.fontFamily||'';
            var isIcon = false;
            for(var j=0;j<ICON_FONTS.length;j++){
              if(ff.indexOf(ICON_FONTS[j])!==-1){isIcon=true;break;}
            }
            if(!isIcon && ff.indexOf('Inter')===-1){
              s.fontFamily = INTER;
            }
          }
        }
        document.addEventListener('DOMContentLoaded',function(){
          var root = document.getElementById('root');
          if(root){
            fixNode(root);
            mo.observe(root,{childList:true,subtree:true});
          }
        });
      })();
    </script>

        <p style="color:#FFD700;margin-top:20px;font-size:16px;letter-spacing:2px;margin-bottom:0;">CDO CRICKET</p>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
